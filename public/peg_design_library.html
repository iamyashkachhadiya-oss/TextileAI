*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}

.count-badge{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.layout{display:flex;gap:16px;align-items:flex-start}
.sidebar{width:200px;flex-shrink:0}
.sidebar-section{margin-bottom:1.25rem}
.sidebar-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.filter-option{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-primary);padding:3px 0;cursor:pointer}
.filter-option input{cursor:pointer;accent-color:#3266ad}
.filter-option span{flex:1}
.filter-option .cnt{font-size:11px;color:var(--color-text-tertiary)}
select.filter-select{width:100%;padding:6px 8px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.clear-btn{font-size:12px;color:#3266ad;cursor:pointer;background:none;border:none;padding:0;margin-top:4px}
.grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:var(--color-border-primary)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fabric-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
.pop-bar-wrap{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.pop-bar-bg{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px}
.pop-bar{height:3px;border-radius:2px;background:#3266ad}
.pop-val{font-size:10px;color:var(--color-text-tertiary);min-width:24px;text-align:right}
.card-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;line-height:1.3}
.card-sub{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px}
.peg-canvas{width:100%;image-rendering:pixelated;border-radius:4px;display:block}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.no-results{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary);font-size:14px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:10}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.25rem;width:100%;max-width:520px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.modal-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--color-text-secondary);line-height:1}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.modal-field{font-size:12px}
.modal-label{color:var(--color-text-secondary);margin-bottom:2px}
.modal-val{font-weight:500;color:var(--color-text-primary)}
.modal-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1rem}
.modal-peg{display:flex;justify-content:center;margin-bottom:1rem}
.matrix-table{border-collapse:collapse}
.matrix-table td{width:20px;height:20px;border:1px solid var(--color-border-tertiary)}
.cell-on{background:#1a3a6b}
.cell-off{background:var(--color-background-secondary)}
</style>

const fabricTypes = [...new Set(DB.map(d=>d.fabric_type))];
const weaveTypes = [...new Set(DB.map(d=>d.weave_type))];

let activeFabrics = new Set();
let activeWeaves = new Set();
let shaftRange = '';
let weightFilter = '';
let sortBy = 'popularity';
let searchQ = '';
let selectedDesign = null;

function buildSidebar(){
  const ff = document.getElementById('fabric-filters');
  fabricTypes.forEach(f=>{
    const cnt = DB.filter(d=>d.fabric_type===f).length;
    const col = fabricColors[f];
    ff.innerHTML += `<label class="filter-option"><input type="checkbox" onchange="toggleFabric('${f}')" /> <span>${f}</span><span class="cnt">${cnt}</span></label>`;
  });
  const wf = document.getElementById('weave-filters');
  const topWeaves = [...new Set(DB.map(d=>d.weave_type))].slice(0,8);
  topWeaves.forEach(w=>{
    const cnt = DB.filter(d=>d.weave_type===w).length;
    wf.innerHTML += `<label class="filter-option"><input type="checkbox" onchange="toggleWeave('${w}')" /> <span>${w}</span><span class="cnt">${cnt}</span></label>`;
  });
  document.getElementById('shaft-select').onchange=e=>{shaftRange=e.target.value;render()};
  document.getElementById('weight-select').onchange=e=>{weightFilter=e.target.value;render()};
  document.getElementById('sort-select').onchange=e=>{sortBy=e.target.value;render()};
  document.getElementById('search').oninput=e=>{searchQ=e.target.value.toLowerCase();render()};
}

function toggleFabric(f){
  if(activeFabrics.has(f))activeFabrics.delete(f);else activeFabrics.add(f);render();
}
function toggleWeave(w){
  if(activeWeaves.has(w))activeWeaves.delete(w);else activeWeaves.add(w);render();
}
function clearFilters(){
  activeFabrics.clear();activeWeaves.clear();shaftRange='';weightFilter='';searchQ='';sortBy='popularity';
  document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);
  document.getElementById('shaft-select').value='';
  document.getElementById('weight-select').value='';
  document.getElementById('sort-select').value='popularity';
  document.getElementById('search').value='';
  render();
}

function shaftInRange(n){
  if(!shaftRange)return true;
  const[a,b]=shaftRange.split('-').map(Number);
  return n>=a&&n<=b;
}

function getFiltered(){
  let data=[...DB];
  if(activeFabrics.size)data=data.filter(d=>activeFabrics.has(d.fabric_type));
  if(activeWeaves.size)data=data.filter(d=>activeWeaves.has(d.weave_type));
  if(shaftRange)data=data.filter(d=>shaftInRange(d.shaft_count));
  if(weightFilter)data=data.filter(d=>d.weight===weightFilter);
  if(searchQ)data=data.filter(d=>
    d.name.toLowerCase().includes(searchQ)||
    d.fabric_type.toLowerCase().includes(searchQ)||
    d.weave_type.toLowerCase().includes(searchQ)||
    (d.twill_ratio+'').toLowerCase().includes(searchQ)||
    d.tags.some(t=>t.includes(searchQ))
  );
  if(sortBy==='popularity')data.sort((a,b)=>b.popularity-a.popularity);
  else if(sortBy==='name')data.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sortBy==='shaft_asc')data.sort((a,b)=>a.shaft_count-b.shaft_count);
  else if(sortBy==='shaft_desc')data.sort((a,b)=>b.shaft_count-a.shaft_count);
  return data;
}

function drawPeg(matrix){
  const canvas=document.createElement('canvas');
  const rows=matrix.length, cols=matrix[0].length;
  const cell=Math.min(Math.floor(80/cols),Math.floor(80/rows));
  canvas.width=cols*cell; canvas.height=rows*cell;
  canvas.style.width='100%'; canvas.style.height='auto';
  const ctx=canvas.getContext('2d');
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      ctx.fillStyle=matrix[r][c]?'#1a3a6b':'#e5e7eb';
      ctx.fillRect(c*cell,r*cell,cell,cell);
      ctx.strokeStyle='#fff';ctx.lineWidth=0.5;
      ctx.strokeRect(c*cell,r*cell,cell,cell);
    }
  }
  return canvas;
}

function render(){
  const data=getFiltered();
  document.getElementById('count-badge').textContent=data.length+' designs';
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  if(!data.length){
    grid.innerHTML='<div class="no-results" style="grid-column:1/-1">No designs match your filters.</div>';
    return;
  }
  data.forEach(d=>{
    const col=fabricColors[d.fabric_type]||{bg:'#f3f4f6',text:'#374151'};
    const div=document.createElement('div');
    div.className='card';
    div.onclick=()=>openModal(d);
    div.innerHTML=`
      <div class="card-top">
        <span class="fabric-badge" style="background:${col.bg};color:${col.text}">${d.fabric_type}</span>
        <span style="font-size:10px;color:var(--color-text-tertiary)">${d.shaft_count}sh</span>
      </div>
      <div class="card-name">${d.name}</div>
      <div class="card-sub">${d.weave_type} · ${d.twill_ratio} · ${d.weight}</div>
      <div class="pop-bar-wrap">
        <div class="pop-bar-bg"><div class="pop-bar" style="width:${d.popularity}%"></div></div>
        <span class="pop-val">${d.popularity}</span>
      </div>
    `;
    const peg=drawPeg(d.peg_matrix);
    peg.className='peg-canvas';
    div.appendChild(peg);
    const tags=document.createElement('div');
    tags.className='tags';
    d.tags.slice(0,3).forEach(t=>{
      tags.innerHTML+=`<span class="tag">${t}</span>`;
    });
    div.appendChild(tags);
    grid.appendChild(div);
  });
}

function openModal(d){
  selectedDesign=d;
  const existing=document.getElementById('modal-overlay');
  if(existing)existing.remove();
  const col=fabricColors[d.fabric_type]||{bg:'#f3f4f6',text:'#374151'};
  const overlay=document.createElement('div');
  overlay.className='modal-bg';
  overlay.id='modal-overlay';
  overlay.style.position='fixed';
  overlay.style.top='0';overlay.style.left='0';overlay.style.right='0';overlay.style.bottom='0';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  const modal=document.createElement('div');
  modal.className='modal';
  modal.innerHTML=`
    <div class="modal-header">
      <div>
        <span class="fabric-badge" style="background:${col.bg};color:${col.text};display:inline-block;margin-bottom:6px">${d.fabric_type}</span>
        <div class="modal-title">${d.name}</div>
      </div>
      <button class="close-btn" onclick="document.getElementById('modal-overlay').remove()">×</button>
    </div>
    <div class="modal-desc">${d.description}</div>
    <div class="modal-grid">
      <div class="modal-field"><div class="modal-label">Weave type</div><div class="modal-val">${d.weave_type}</div></div>
      <div class="modal-field"><div class="modal-label">Ratio</div><div class="modal-val">${d.twill_ratio}</div></div>
      <div class="modal-field"><div class="modal-label">Shafts</div><div class="modal-val">${d.shaft_count}</div></div>
      <div class="modal-field"><div class="modal-label">Repeat</div><div class="modal-val">${d.repeat_size}×${d.repeat_size}</div></div>
      <div class="modal-field"><div class="modal-label">Angle</div><div class="modal-val">${d.angle}°</div></div>
      <div class="modal-field"><div class="modal-label">Threading</div><div class="modal-val">${d.threading}</div></div>
      <div class="modal-field"><div class="modal-label">Weight</div><div class="modal-val">${d.weight}</div></div>
      <div class="modal-field"><div class="modal-label">Float</div><div class="modal-val">${d.float_length}</div></div>
      <div class="modal-field"><div class="modal-label">Direction</div><div class="modal-val">${d.direction}</div></div>
      <div class="modal-field"><div class="modal-label">Popularity</div><div class="modal-val">${d.popularity}/100</div></div>
    </div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500">Peg plan matrix (${d.repeat_size}×${d.peg_matrix[0].length})</div>
  `;
  const pegWrap=document.createElement('div');
  pegWrap.className='modal-peg';
  const bigCanvas=drawPegLarge(d.peg_matrix);
  pegWrap.appendChild(bigCanvas);
  modal.appendChild(pegWrap);
  const tagsDiv=document.createElement('div');
  tagsDiv.className='tags';
  d.tags.forEach(t=>tagsDiv.innerHTML+=`<span class="tag">${t}</span>`);
  modal.appendChild(tagsDiv);
  overlay.appendChild(modal);
  document.getElementById('root').appendChild(overlay);
}

function drawPegLarge(matrix){
  const canvas=document.createElement('canvas');
  const rows=matrix.length, cols=matrix[0].length;
  const cell=24;
  canvas.width=cols*cell; canvas.height=rows*cell;
  canvas.style.width=(cols*cell)+'px'; canvas.style.height=(rows*cell)+'px';
  canvas.style.maxWidth='100%';
  const ctx=canvas.getContext('2d');
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      ctx.fillStyle=matrix[r][c]?'#1a3a6b':'#e5e7eb';
      ctx.fillRect(c*cell,r*cell,cell,cell);
      ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.strokeRect(c*cell,r*cell,cell,cell);
      if(matrix[r][c]){
        ctx.fillStyle='#6b9bd2';
        ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('▲',c*cell+cell/2,r*cell+cell/2);
      }
    }
  }
  return canvas;
}

buildSidebar();
render();
</script>
